version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ayurveda_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HOST=0.0.0.0
      - QDRANT__LOG_LEVEL=WARN
    restart: unless-stopped
